<!DOCTYPE html>
<html><head><title>Privacy wijzer zorg!</title>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width">
<style>body{font-family:system-ui;background:#1a1a2e;color:#fff;padding:40px;max-width:900px;margin:auto}
input{width:100%;padding:20px;font-size:18px;border-radius:12px;border:none;margin-bottom:30px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.result{background:#16213e;padding:25px;margin:20px 0;border-radius:12px}.risk{padding:8px 16px;border-radius:20px;font-weight:bold;display:inline-block}</style></head>
<body>
<h1>Privacy wijzer zorg!</h1>
<input id="search" placeholder="Typ: datalek, WGBO...">
<div id="results"></div>
<script>
async function search(q='') {
  const r = await fetch(`/api/search?q=${q}`);
  const data = await r.json();
  document.getElementById('results').innerHTML = data.map(d=>`
    <div class="result">
      <h3>${d.question}</h3>
      <p>${d.answer}</p>
      <span class="risk" style="background:#f00;color:white">${d.risk}</span>
    </div>
  `).join('') || '<p>Geen resultaten - probeer "datalek"</p>';
}
document.getElementById('search').oninput = e=>search(e.target.value);
</script>
</body></html>
