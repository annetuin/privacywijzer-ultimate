<!DOCTYPE html>
<html lang="nl">
<head>
    <title>Privacy Wijzer Zorg Pro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f1f5f9;
            --critical: #ef4444;
            --high: #f97316;
            --medium: #eab308;
            --low: #22c55e;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            padding: 20px;
            max-width: 1000px;
            margin: auto;
            min-height: 100vh;
        }

        header { text-align: center; padding: 40px 0; }
        h1 { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-container { position: sticky; top: 20px; z-index: 100; backdrop-filter: blur(10px); padding: 10px; }
        input { width: 100%; padding: 20px; font-size: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: var(--card-bg); color: #fff; outline: none; }

        .quick-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .tag-btn { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .tag-btn:hover { background: var(--accent); color: #000; }

        .result { background: var(--card-bg); padding: 30px; margin: 25px 0; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .category-badge { font-size: 0.7rem; background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 4px; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        
        .source-link { display: inline-block; margin-top: 15px; color: var(--accent); text-decoration: none; font-weight: 600; padding: 10px; border: 1px solid var(--accent); border-radius: 8px; }
        .source-link:hover { background: rgba(56, 189, 248, 0.1); }

        .risk { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .risk-critical { background: var(--critical); color: #fff; }
        .risk-high { background: var(--high); color: #fff; }
        .risk-medium { background: var(--medium); color: #000; }
        .risk-low { background: var(--low); color: #fff; }

        footer { text-align: center; margin-top: 50px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); color: #64748b; }
    </style>
</head>
<body>

<header>
    <h1>Privacy Wijzer Gehandicaptenzorg</h1>
    <p>Simpele antwoorden op complexe privacyvragen</p>
</header>

<div class="search-container">
    <input id="search" placeholder="Zoek op term (bijv. Wzd, dossier, foto)..." autocomplete="off">
    <div class="quick-tags">
        <button class="tag-btn" onclick="quickSearch('Wzd')">Zorg en dwang</button>
        <button class="tag-btn" onclick="quickSearch('vertegenwoordiger')">Vertegenwoordiging</button>
        <button class="tag-btn" onclick="quickSearch('foto')">WhatsApp & Foto's</button>
        <button class="tag-btn" onclick="quickSearch('dossier')">Bewaartermijn</button>
    </div>
</div>

<div id="results"></div>

<footer>
    <p>Deze applicatie verwerkt geen persoonsgegevens.</p>
    <a href="https://jouwdomein.nl/privacy" style="color:var(--accent); text-decoration:none;">Privacyverklaring</a>
</footer>

<script>
const database = [
    { 
        "category": "Wet zorg en dwang (Wzd)", 
        "question": "Mag ik een camera of sensor gebruiken in de kamer?", 
        "answer": "Toezicht via camera's of sensoren in de gehandicaptenzorg valt onder de Wet zorg en dwang. Dit mag alleen als er een ernstig risico is voor de cliënt en dit is vastgelegd in het zorgplan na overleg met de gedragsdeskundige en de vertegenwoordiger.", 
        "risk": "high", 
        "laws": "Wzd / AVG",
        "url": "https://www.dwangindezorg.nl/wzd/onvrijwillige-zorg/vormen"
    },
    { 
        "category": "Communicatie", 
        "question": "Mag ik foto's van cliënten delen via WhatsApp?", 
        "answer": "Nee, de standaard WhatsApp is niet veilig genoeg voor cliëntgegevens. Gebruik alleen beveiligde apps die de organisatie heeft goedgekeurd en zorg dat je altijd toestemming hebt van de cliënt of de wettelijk vertegenwoordiger.", 
        "risk": "critical", 
        "laws": "AVG Artikel 32",
        "url": "https://www.vgn.nl/artikel/handreiking-privacy-de-gehandicaptenzorg"
    },
    { 
        "category": "Bewaartermijnen", 
        "question": "Hoe lang bewaar ik het dossier van een cliënt?", 
        "answer": "De wettelijke bewaartermijn is 20 jaar. Deze termijn gaat pas in na de laatste wijziging in het dossier of nadat de zorgovereenkomst officieel is gestopt.", 
        "risk": "medium", 
        "laws": "WGBO",
        "url": "https://www.knmg.nl/advies-richtlijnen/dossier-bewaren"
    }
];

function displayResults(data) {
    const container = document.getElementById('results');
    if (data.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:50px;">Geen resultaten gevonden.</div>';
        return;
    }

    container.innerHTML = data.map(d => `
        <div class="result">
            <span class="category-badge">${d.category}</span>
            <h3>${d.question}</h3>
            <p>${d.answer}</p>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
                <span class="laws" style="font-size:0.8rem; color:#94a3b8;">Bron: ${d.laws}</span>
                <span class="risk risk-${d.risk}">${d.risk}</span>
            </div>
            <a href="${d.url}" target="_blank" class="source-link">🔗 Bekijk officiële bron</a>
        </div>
    `).join('');
}

function quickSearch(term) {
    document.getElementById('search').value = term;
    const event = new Event('input', { bubbles: true });
    document.getElementById('search').dispatchEvent(event);
}

document.getElementById('search').oninput = e => {
    const val = e.target.value.toLowerCase();
    if (val.length < 2) {
        document.getElementById('results').innerHTML = '';
        return;
    }
    const filtered = database.filter(d => 
        d.question.toLowerCase().includes(val) || d.category.toLowerCase().includes(val)
    );
    displayResults(filtered);
};
</script>
</body>
</html>
