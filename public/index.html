<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Privacy Officer Wijzer PRO - Expert Editie</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --subtle: #f4f4f5;
            --accent: #000000;
            --border: #e4e4e7;
            --meta: #71717a;
            --rainbow: linear-gradient(to right, #ef4444, #f97316, #eab308, #22c55e, #38bdf8, #a855f7);
            --risk-low: #22c55e;
            --risk-med: #f97316;
            --risk-high: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; line-height: 1.5; }
        .container { max-width: 850px; width: 100%; }
        header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        h1 { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .officer-btn { background: var(--text); color: var(--bg); border: none; padding: 8px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; cursor: pointer; }
        
        .search-area { position: sticky; top: 0; background: var(--bg); z-index: 100; padding-top: 10px; border-bottom: 1px solid var(--border); }
        input { width: 100%; padding: 15px 0; font-size: 1.2rem; border: none; background: transparent; outline: none; font-weight: 600; }
        .rainbow-line { height: 3px; background: var(--rainbow); margin-bottom: 10px; }
        
        .result { padding: 30px 0; border-bottom: 1px solid var(--border); }
        .res-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .category-tag { font-size: 0.65rem; text-transform: uppercase; color: var(--meta); font-weight: 800; letter-spacing: 0.05em; }
        .risk-badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 10px; color: white; font-weight: 700; text-transform: uppercase; }
        
        h3 { font-size: 1.2rem; margin-bottom: 10px; color: #000; line-height: 1.3; }
        .answer { font-size: 1rem; color: #333; margin-bottom: 15px; border-left: 3px solid #eee; padding-left: 15px; }
        
        .res-footer { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
        .footer-item { font-size: 0.75rem; background: var(--subtle); padding: 5px 10px; border-radius: 4px; color: #444; }
        .footer-item strong { color: var(--accent); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 40px 20px; overflow-y: auto; }
        .decision-box { background: var(--subtle); padding: 20px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #000; }
        footer { margin-top: 60px; padding: 20px; font-size: 0.7rem; text-align: center; color: var(--meta); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Privacy Officer <span style="font-weight:300">Wijzer PRO</span></h1>
        <div class="nav-group">
            <button class="officer-btn" onclick="openModal('consentModal')" style="background:#ef4444">Toestemming</button>
            <button class="officer-btn" onclick="openModal('dpiaModal')">DPIA Pro</button>
            <button class="officer-btn" onclick="openModal('calcModal')">Bewaartermijn</button>
            <button class="officer-btn" onclick="openModal('datalekModal')">Datalek</button>
        </div>
    </header>

    <div class="search-area">
        <input id="search" placeholder="Zoek op onderwerp, wet (WGBO, Wzd) of artikel..." autocomplete="off">
        <div class="rainbow-line"></div>
        <div style="font-size: 0.7rem; color: var(--meta); margin-bottom: 10px;">Suggesties: <strong>Art 28</strong>, <strong>Wilsonbekwaam</strong>, <strong>Camera</strong>, <strong>BSN</strong></div>
    </div>

    <div id="results">
        <div style="padding:60px; text-align:center; color:var(--meta)">
            Voer een zoekterm in om de database (Wet, Bron & Risico) te raadplegen.
        </div>
    </div>

    <footer>Expert Tooling v2026.4 • April 2026 Update</footer>
</div>

<div id="consentModal" class="modal">
    <div style="max-width:650px; margin:0 auto;">
        <h2>Checklist Toestemming 2026</h2>
        <div class="decision-box">Toetsing op basis van VGN Model en WGBO.</div>
        <button class="officer-btn" onclick="closeModal('consentModal')" style="margin-top:20px; width:100%">Sluiten</button>
    </div>
</div>

<div id="dpiaModal" class="modal">
    <div style="max-width:600px; margin:0 auto;">
        <h2>DPIA Concept Generator</h2>
        <input type="text" id="dpia-name" placeholder="Projectnaam">
        <button class="officer-btn" onclick="generateDPIA()" style="width:100%; margin-top:10px;">Genereer</button>
        <div id="dpia-result" class="decision-box" style="display:none; white-space:pre-wrap;"></div>
        <button class="officer-btn" onclick="closeModal('dpiaModal')" style="margin-top:20px;">Sluiten</button>
    </div>
</div>

<script>
const db = [
    { 
        cat: "Toestemming", 
        q: "Wie tekent bij wilsonbekwaamheid?", 
        a: "De wettelijk vertegenwoordiger (mentor/curator). Bij ontbreken: partner of naaste familie.", 
        law: "WGBO Art. 465", 
        source: "VGN Handreiking Privacy", 
        risk: "Hoog" 
    },
    { 
        cat: "Wzd", 
        q: "Cameratoezicht in de slaapkamer?", 
        a: "Onvrijwillige zorg. Alleen bij ernstig nadeel en als minder ingrijpende middelen niet werken. Moet in zorgplan.", 
        law: "Wzd Art. 2.1", 
        source: "Dwangindezorg.nl", 
        risk: "Zeer Hoog" 
    },
    { 
        cat: "VWO", 
        q: "Inhoud van de Verwerkersovereenkomst?", 
        a: "Afspraken over onderwerp, duur, aard en doel van verwerking, beveiliging en datalek-termijn.", 
        law: "AVG Artikel 28", 
        source: "BoZ Model VWO", 
        risk: "Gemiddeld" 
    },
    { 
        cat: "Datalek", 
        q: "BSN naar verkeerde ontvanger?", 
        a: "Gezien de aard van de gegevens (BSN + zorginfo) is dit bijna altijd een meldplichtig lek bij de AP.", 
        law: "AVG Artikel 33", 
        source: "Autoriteit Persoonsgegevens", 
        risk: "Hoog" 
    },
    { 
        cat: "Inzage", 
        q: "Recht op kopie dossier?", 
        a: "Cliënt heeft recht op een gratis eerste kopie van het volledige dossier.", 
        law: "WGBO Art. 456", 
        source: "Rijksoverheid", 
        risk: "Laag" 
    },
    { 
        cat: "HR", 
        q: "Kopie ID-bewijs werknemer?", 
        a: "Verplicht voor loonbelasting. Mag niet voor ZZP'ers of vrijwilligers (alleen controle).", 
        law: "Wet op de Loonbelasting", 
        source: "Belastingdienst", 
        risk: "Gemiddeld" 
    },
    { 
        cat: "Marketing", 
        q: "Foto's cliënten op de website?", 
        a: "Expliciete, specifieke toestemming nodig. Vooraf informeren over intrekbaarheid.", 
        law: "AVG Artikel 7", 
        source: "VGN Model 2024", 
        risk: "Hoog" 
    }
];

function handleSearch(val) {
    const term = val.toLowerCase().trim();
    const resDiv = document.getElementById('results');
    
    if(term.length < 2) { 
        resDiv.innerHTML = '<div style="padding:60px; text-align:center; color:var(--meta)">Voer een zoekterm in om de database te raadplegen.</div>'; 
        return; 
    }
    
    const filtered = db.filter(i => 
        i.q.toLowerCase().includes(term) || 
        i.cat.toLowerCase().includes(term) || 
        i.a.toLowerCase().includes(term) || 
        i.law.toLowerCase().includes(term) || 
        i.source.toLowerCase().includes(term)
    );
    
    if(filtered.length === 0) {
        resDiv.innerHTML = '<div style="padding:60px; text-align:center;">Geen resultaten gevonden voor deze term of wet.</div>';
        return;
    }

    resDiv.innerHTML = filtered.map(i => {
        let riskColor = "var(--risk-low)";
        if(i.risk === "Gemiddeld") riskColor = "var(--risk-med)";
        if(i.risk === "Hoog" || i.risk === "Zeer Hoog") riskColor = "var(--risk-high)";

        return `
            <div class="result">
                <div class="res-header">
                    <span class="category-tag">${i.cat}</span>
                    <span class="risk-badge" style="background:${riskColor}">Risico: ${i.risk}</span>
                </div>
                <h3>${i.q}</h3>
                <div class="answer">${i.a}</div>
                <div class="res-footer">
                    <div class="footer-item"><strong>Wet:</strong> ${i.law}</div>
                    <div class="footer-item"><strong>Bron:</strong> ${i.source}</div>
                </div>
            </div>
        `;
    }).join('');
}

document.getElementById('search').oninput = (e) => handleSearch(e.target.value);
function openModal(id) { document.getElementById(id).style.display = 'block'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function generateDPIA() {
    const name = document.getElementById('dpia-name').value || "Naamloos";
    const out = document.getElementById('dpia-result');
    out.style.display = 'block';
    out.innerText = `DPIA CONCEPT: ${name}\nDatum: ${new Date().toLocaleDateString()}\nFocus: Privacy-by-design & Risicobeperking.`;
}
</script>
</body>
</html>
