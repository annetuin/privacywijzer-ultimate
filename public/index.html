<!DOCTYPE html>
<html lang="nl">
<head>
    <title>Privacy Wijzer — Gehandicaptenzorg</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --subtle: #f4f4f5;
            --accent: #000000;
            --border: #e4e4e7;
            --meta: #71717a;
            --rainbow: linear-gradient(to right, #ef4444, #f97316, #eab308, #22c55e, #38bdf8, #a855f7);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 650px; }

        header { margin-bottom: 40px; }
        h1 { font-size: 1.4rem; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
        header p { color: var(--meta); font-size: 0.85rem; margin-top: 5px; }

        .search-container {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 10px 0 15px 0;
            margin-bottom: 20px;
            z-index: 10;
        }

        .search-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--rainbow);
        }

        input {
            width: 100%;
            padding: 12px 0;
            font-size: 1.1rem;
            border: none;
            background: transparent;
            outline: none;
        }

        .result { padding: 30px 0; border-bottom: 1px solid var(--border); }
        .category { font-size: 0.7rem; text-transform: uppercase; color: var(--meta); font-weight: 800; letter-spacing: 0.05em; }
        h3 { font-size: 1.2rem; margin: 10px 0; font-weight: 600; }
        p { font-size: 1rem; line-height: 1.6; color: #3f3f46; margin-bottom: 20px; }

        .footer-card { display: flex; justify-content: space-between; align-items: center; }
        .source-btn { 
            padding: 8px 14px; 
            background: var(--text); 
            color: var(--bg); 
            text-decoration: none; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            font-weight: 600;
        }

        footer { margin-top: 80px; padding: 20px 0; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--meta); text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Privacy Wijzer</h1>
        <p>Expert Dashboard — Gehandicaptenzorg</p>
    </header>

    <div class="search-container">
        <input id="search" placeholder="Zoek op term (bijv. Wzd, AVG, dossier)..." autocomplete="off">
    </div>

    <div id="results">
        <div style="text-align:center; padding:50px; color:var(--meta);">Typ 2 letters om de database te doorzoeken...</div>
    </div>

    <footer>
        Geen gegevensverwerking • Lokaal naslagwerk v2026
    </footer>
</div>

<script>
/**
 * DATABASE: VOEG HIER NIEUWE ITEMS TOE
 * Kopieer een bestaand blok { ... } en plak het onderaan de lijst.
 */
const database = [
    { 
        "cat": "Dossiervorming", 
        "q": "Hoe lang moet het dossier bewaard blijven?", 
        "a": "De standaardtermijn is 20 jaar na de laatste wijziging of beëindiging van de zorgvereenkomst.", 
        "law": "WGBO / Wzd",
        "url": "https://www.rijksoverheid.nl/onderwerpen/rechten-van-patient-en-cliënt/medisch-dossier"
    },
    { 
        "cat": "Wzd", 
        "q": "Camera of sensor in de slaapkamer?", 
        "a": "Toezicht via techniek mag alleen bij ernstig risico voor de cliënt. Dit moet altijd in het zorgplan staan en periodiek geëvalueerd worden.", 
        "law": "Wzd / AVG",
        "url": "https://www.dwangindezorg.nl/wzd/onvrijwillige-zorg/vormen"
    },
    { 
        "cat": "Communicatie", 
        "q": "WhatsApp gebruiken voor cliëntgegevens?", 
        "a": "Standaard WhatsApp is onveilig. Gebruik uitsluitend goedgekeurde organisatie-apps (bijv. Siilo of ZorgMail).", 
        "law": "AVG Art. 32",
        "url": "https://www.vgn.nl/artikel/handreiking-privacy-de-gehandicaptenzorg"
    },
    { 
        "cat": "Incidenten", 
        "q": "Incident tussen cliënten in het dossier?", 
        "a": "Rapporteer in dossier cliënt A zonder cliënt B bij naam te noemen om diens privacy te waarborgen.", 
        "law": "AVG / WGBO",
        "url": "https://www.autoriteitpersoonsgegevens.nl/themas/gezondheid/medisch-dossier/rechten-van-de-patient"
    }
];

/**
 * LOGICA: HIERONDER NIETS WIJZIGEN (tenzij je de werking wilt aanpassen)
 */
const searchInput = document.getElementById('search');
const resultsContainer = document.getElementById('results');

function handleSearch(query) {
    const term = query.toLowerCase().trim();

    if (term.length < 2) {
        resultsContainer.innerHTML = '<div style="text-align:center; padding:50px; color:var(--meta);">Typ minimaal 2 letters...</div>';
        return;
    }
    
    const filtered = database.filter(item => 
        item.q.toLowerCase().includes(term) || 
        item.a.toLowerCase().includes(term) ||
        item.cat.toLowerCase().includes(term)
    );

    if (filtered.length === 0) {
        resultsContainer.innerHTML = '<div style="text-align:center; padding:50px; color:var(--meta);">Geen resultaten gevonden.</div>';
        return;
    }

    resultsContainer.innerHTML = filtered.map(item => `
        <div class="result">
            <div class="category">${item.cat}</div>
            <h3>${item.q}</h3>
            <p>${item.a}</p>
            <div class="footer-card">
                <span style="color:var(--meta); font-size:0.8rem;">Bron: ${item.law}</span>
                ${item.url ? `<a href="${item.url}" target="_blank" class="source-btn">Open Bron</a>` : ''}
            </div>
        </div>
    `).join('');
}

searchInput.oninput = (e) => handleSearch(e.target.value);
</script>

</body>
</html>
