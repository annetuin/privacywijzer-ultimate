<!DOCTYPE html>
<html lang="nl">
<head>
    <title>Privacy Wijzer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --subtle: #f4f4f5;
            --accent: #000000;
            --border: #e4e4e7;
            --meta: #71717a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        header { margin-bottom: 40px; }
        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
        header p { color: var(--meta); font-size: 0.9rem; margin-top: 5px; }

        .search-container {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 10px 0 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 0;
            font-size: 1.1rem;
            border: none;
            border-bottom: 2px solid var(--border);
            background: transparent;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }

        .quick-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; }
        .tag-btn {
            background: var(--subtle);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text);
        }

        .result {
            padding: 25px 0;
            border-bottom: 1px solid var(--border);
        }

        .category { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--meta); font-weight: 600; }
        h3 { font-size: 1.2rem; margin: 8px 0; font-weight: 600; }
        p { font-size: 1rem; line-height: 1.6; color: #3f3f46; margin-bottom: 15px; }

        .footer-card { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .source-link { color: var(--accent); font-weight: 600; text-decoration: none; border-bottom: 1px solid var(--accent); }

        .empty-state { text-align: center; padding: 100px 0; color: var(--meta); font-size: 0.9rem; }

        footer { margin-top: 100px; padding: 40px 0; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--meta); text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Privacy Wijzer</h1>
        <p>Gehandicaptenzorg — Snel naslagwerk</p>
    </header>

    <div class="search-container">
        <input id="search" placeholder="Zoek op onderwerp..." autocomplete="off">
        <div class="quick-tags">
            <button class="tag-btn" onclick="quickSearch('Wzd')">Wzd</button>
            <button class="tag-btn" onclick="quickSearch('foto')">WhatsApp</button>
            <button class="tag-btn" onclick="quickSearch('dossier')">Bewaartermijn</button>
        </div>
    </div>

    <div id="results">
        <div class="empty-state">Begin met typen (min. 2 tekens)</div>
    </div>

    <footer>
        Geen gegevensverwerking • <a href="#" style="color:var(--meta)">Privacy</a>
    </footer>
</div>

<script>
const database = [
    { 
        "category": "Wzd", 
        "question": "Camera of sensor in de kamer?", 
        "answer": "Toezicht via camera's of sensoren valt onder de Wet zorg en dwang. Dit mag alleen bij ernstig risico voor de cliënt en moet vastgelegd zijn in het zorgplan na overleg met de gedragsdeskundige en vertegenwoordiger.", 
        "laws": "Wzd",
        "url": "https://www.dwangindezorg.nl/wzd/onvrijwillige-zorg/vormen"
    },
    { 
        "category": "Privacy", 
        "question": "Foto's delen via WhatsApp?", 
        "answer": "Standaard WhatsApp is niet veilig voor cliëntgegevens. Gebruik uitsluitend beveiligde organisatie-apps en zorg voor expliciete toestemming van de cliënt of vertegenwoordiger.", 
        "laws": "AVG Art. 32",
        "url": "https://www.vgn.nl/artikel/handreiking-privacy-de-gehandicaptenzorg"
    },
    { 
        "category": "Dossier", 
        "question": "Hoe lang bewaren?", 
        "answer": "De wettelijke termijn is minimaal 20 jaar na de laatste wijziging of beëindiging van de zorgovereenkomst.", 
        "laws": "WGBO",
        "url": "https://www.knmg.nl/advies-richtlijnen/dossier-bewaren"
    }
];

function displayResults(data) {
    const container = document.getElementById('results');
    if (data.length === 0) {
        container.innerHTML = '<div class="empty-state">Niets gevonden.</div>';
        return;
    }

    container.innerHTML = data.map(d => `
        <div class="result">
            <div class="category">${d.category}</div>
            <h3>${d.question}</h3>
            <p>${d.answer}</p>
            <div class="footer-card">
                <span style="color:var(--meta)">Bron: ${d.laws}</span>
                <a href="${d.url}" target="_blank" class="source-link">Lees meer</a>
            </div>
        </div>
    `).join('');
}

function quickSearch(term) {
    const input = document.getElementById('search');
    input.value = term;
    handleSearch(term);
}

function handleSearch(query) {
    const val = query.toLowerCase();
    const container = document.getElementById('results');

    if (val.length < 2) {
        container.innerHTML = '<div class="empty-state">Begin met typen...</div>';
        return;
    }
    
    const filtered = database.filter(d => 
        d.question.toLowerCase().includes(val) || 
        d.answer.toLowerCase().includes(val) ||
        d.category.toLowerCase().includes(val)
    );
    
    displayResults(filtered);
}

document.getElementById('search').oninput = e => handleSearch(e.target.value);
</script>

</body>
</html>
